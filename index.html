<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>업무일지</title>
<style>
  :root {
    --bg: #f4f5f7;
    --card-bg: #ffffff;
    --note-bg: #fffdf4;
    --note-border: #f0e6b8;
    --text: #1f2328;
    --text-muted: #6b7280;
    --accent: #f5b400;
    --accent-dark: #d99a00;
    --danger: #ef4444;
    --border: #e5e7eb;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #17181c;
      --card-bg: #1f2126;
      --note-bg: #262820;
      --note-border: #3a3626;
      --text: #e8e9ec;
      --text-muted: #9a9ea5;
      --accent: #f5b400;
      --accent-dark: #ffcc33;
      --danger: #f87171;
      --border: #2e3036;
      --shadow: 0 1px 3px rgba(0,0,0,0.4), 0 1px 2px rgba(0,0,0,0.3);
    }
  }
  :root[data-theme="dark"] {
    --bg: #17181c; --card-bg: #1f2126; --note-bg: #262820; --note-border: #3a3626;
    --text: #e8e9ec; --text-muted: #9a9ea5; --accent: #f5b400; --accent-dark: #ffcc33;
    --danger: #f87171; --border: #2e3036; --shadow: 0 1px 3px rgba(0,0,0,0.4), 0 1px 2px rgba(0,0,0,0.3);
  }
  :root[data-theme="light"] {
    --bg: #f4f5f7; --card-bg: #ffffff; --note-bg: #fffdf4; --note-border: #f0e6b8;
    --text: #1f2328; --text-muted: #6b7280; --accent: #f5b400; --accent-dark: #d99a00;
    --danger: #ef4444; --border: #e5e7eb; --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "Segoe UI", "Pretendard", "Malgun Gothic", sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  .app {
    max-width: 720px;
    margin: 0 auto;
    padding: 32px 20px 80px;
  }
  header {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 24px;
  }
  header h1 {
    font-size: 22px;
    margin: 0;
  }
  header .count {
    color: var(--text-muted);
    font-size: 13px;
  }
  .form-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px;
    box-shadow: var(--shadow);
    margin-bottom: 28px;
  }
  textarea#contentInput {
    width: 100%;
    min-height: 90px;
    resize: vertical;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    font-size: 14.5px;
    font-family: inherit;
    background: transparent;
    color: var(--text);
    line-height: 1.5;
  }
  textarea#contentInput:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
  .datetime-row {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 14px;
    margin-top: 12px;
    font-size: 13px;
    color: var(--text-muted);
  }
  .datetime-row label { display: flex; align-items: center; gap: 6px; }
  .datetime-row input[type="datetime-local"] {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 5px 8px;
    font-family: inherit;
    font-size: 13px;
    background: var(--card-bg);
    color: var(--text);
  }
  .hidden { display: none !important; }
  .actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 14px;
  }
  button {
    font-family: inherit;
    font-size: 14px;
    border: none;
    border-radius: 9px;
    padding: 9px 18px;
    cursor: pointer;
    font-weight: 600;
    transition: opacity .15s;
  }
  button:hover { opacity: 0.85; }
  #saveBtn { background: var(--accent); color: #1f2328; }
  #cancelEditBtn { background: var(--border); color: var(--text); }
  .entry-list { display: flex; flex-direction: column; gap: 14px; }
  .entry-card {
    background: var(--note-bg);
    border: 1px solid var(--note-border);
    border-radius: 12px;
    padding: 16px 18px;
    box-shadow: var(--shadow);
    position: relative;
  }
  .entry-meta {
    font-size: 12.5px;
    color: var(--text-muted);
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }
  .entry-meta .stamp { font-weight: 600; color: var(--accent-dark); }
  .entry-content {
    white-space: pre-wrap;
    word-break: break-word;
    font-size: 14.5px;
    line-height: 1.55;
  }
  .entry-actions {
    display: flex;
    gap: 6px;
  }
  .icon-btn {
    background: transparent;
    color: var(--text-muted);
    padding: 3px 6px;
    font-size: 12px;
    font-weight: 500;
    border-radius: 6px;
  }
  .icon-btn:hover { background: var(--border); opacity: 1; }
  .icon-btn.danger { color: var(--danger); }
  .icon-btn.confirming { background: var(--danger); color: #fff; }
  .empty-state {
    text-align: center;
    color: var(--text-muted);
    padding: 60px 0;
    font-size: 14px;
  }
  .todo-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px;
    box-shadow: var(--shadow);
    margin-bottom: 28px;
  }
  .todo-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .todo-header h2 {
    font-size: 15px;
    margin: 0;
  }
  #pipBtn {
    background: var(--border);
    color: var(--text);
    font-size: 12.5px;
    padding: 6px 12px;
  }
  .todo-hint {
    font-size: 11.5px;
    color: var(--text-muted);
    margin-top: 6px;
  }
  .todo-input-row {
    display: flex;
    gap: 8px;
  }
  #todoInput {
    flex: 1;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    font-family: inherit;
    font-size: 14px;
    background: transparent;
    color: var(--text);
  }
  #todoInput:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
  #todoAddBtn { background: var(--accent); color: #1f2328; padding: 8px 16px; }
  .todo-list {
    list-style: none;
    margin: 12px 0 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .todo-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 8px;
    border-radius: 8px;
  }
  .todo-item:hover { background: var(--bg); }
  .todo-item input[type="checkbox"] {
    margin-top: 3px;
    width: 16px;
    height: 16px;
    flex-shrink: 0;
    accent-color: var(--accent);
  }
  .todo-item .todo-body { flex: 1; min-width: 0; }
  .todo-text-row {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }
  .todo-item .todo-text {
    font-size: 14px;
    word-break: break-word;
  }
  .memo-trigger {
    position: relative;
    font-size: 11px;
    color: var(--text-muted);
    cursor: pointer;
    padding: 1px 7px;
    border-radius: 6px;
    border: 1px dashed var(--border);
    white-space: nowrap;
  }
  .memo-trigger:hover { background: var(--bg); }
  .memo-popup {
    display: none;
    position: absolute;
    top: 100%;
    left: 0;
    margin-top: 6px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: var(--shadow);
    padding: 10px 12px;
    width: max-content;
    max-width: 260px;
    white-space: pre-wrap;
    font-size: 12.5px;
    color: var(--text);
    z-index: 20;
    cursor: default;
  }
  .memo-trigger:hover .memo-popup { display: block; }
  .memo-edit { margin-top: 8px; }
  .memo-edit textarea {
    width: 100%;
    min-height: 60px;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px;
    font-family: inherit;
    font-size: 13px;
    background: transparent;
    color: var(--text);
    resize: vertical;
  }
  .memo-edit-actions {
    display: flex;
    justify-content: flex-end;
    gap: 6px;
    margin-top: 6px;
  }
  .memo-edit-actions button { padding: 5px 12px; font-size: 12px; }
  .memo-save-btn { background: var(--accent); color: #1f2328; }
  .memo-cancel-btn { background: var(--border); color: var(--text); }
  .todo-item .todo-meta {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
  }
  .todo-item .delete-btn {
    flex-shrink: 0;
  }
  .todo-empty {
    text-align: center;
    color: var(--text-muted);
    font-size: 13px;
    padding: 16px 0;
  }
  .todo-placeholder {
    text-align: center;
    color: var(--text-muted);
    font-size: 13px;
  }
  .category-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 12px;
    font-size: 13px;
    color: var(--text-muted);
  }
  .category-row label { display: flex; align-items: center; gap: 6px; }
  #categoryInput {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 5px 8px;
    font-family: inherit;
    font-size: 13px;
    background: var(--card-bg);
    color: var(--text);
  }
  .category-manage-btn {
    background: transparent;
    color: var(--text-muted);
    font-size: 12px;
    padding: 4px 2px;
    text-decoration: underline;
  }
  .category-panel {
    margin-top: 10px;
    padding: 12px;
    border: 1px dashed var(--border);
    border-radius: 10px;
  }
  .category-chip-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 10px;
  }
  .category-chip {
    display: flex;
    align-items: center;
    gap: 4px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 4px 6px 4px 12px;
    font-size: 12.5px;
  }
  .category-chip button {
    background: transparent;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 2px 6px;
    font-size: 13px;
    font-weight: 700;
  }
  .category-add-row { display: flex; gap: 6px; }
  .category-add-row input {
    flex: 1;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 8px;
    font-family: inherit;
    font-size: 13px;
    background: transparent;
    color: var(--text);
  }
  .category-add-row button { padding: 6px 14px; font-size: 12.5px; background: var(--accent); color: #1f2328; }
  .meta-left { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .category-tag {
    background: var(--border);
    color: var(--text);
    border-radius: 999px;
    padding: 2px 9px;
    font-size: 11px;
    font-weight: 600;
  }
  .summary-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px;
    box-shadow: var(--shadow);
    margin-bottom: 28px;
  }
  .summary-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 12px;
    gap: 8px;
  }
  .summary-header h2 { font-size: 15px; margin: 0; }
  .summary-range { font-size: 12px; color: var(--text-muted); }
  .summary-group { margin-bottom: 14px; }
  .summary-group:last-child { margin-bottom: 0; }
  .summary-group-title {
    font-size: 13.5px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .summary-group-title .count { font-weight: 500; color: var(--text-muted); font-size: 12px; }
  .summary-item {
    font-size: 13px;
    color: var(--text);
    padding: 4px 0 4px 10px;
    border-left: 2px solid var(--border);
    margin-bottom: 4px;
  }
  .summary-item .summary-time { color: var(--text-muted); font-size: 11.5px; margin-right: 6px; }
  .summary-empty {
    text-align: center;
    color: var(--text-muted);
    font-size: 13px;
    padding: 16px 0;
  }
  .search-row {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 16px;
  }
  .search-row input[type="text"] {
    flex: 1;
    min-width: 140px;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    font-family: inherit;
    font-size: 13.5px;
    background: var(--card-bg);
    color: var(--text);
  }
  .search-row input[type="text"]:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
  .search-row input[type="date"] {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 8px;
    font-family: inherit;
    font-size: 13px;
    background: var(--card-bg);
    color: var(--text);
  }
  .search-row button {
    background: var(--border);
    color: var(--text);
    font-size: 12.5px;
    padding: 7px 14px;
  }
  .io-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 20px;
  }
  .io-row button {
    background: var(--border);
    color: var(--text);
    font-size: 12.5px;
    padding: 6px 12px;
  }
  .io-status {
    font-size: 12px;
    color: var(--text-muted);
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>📝 업무일지</h1>
    <span class="count" id="entryCount"></span>
  </header>

  <div class="io-row">
    <button type="button" id="exportBtn">⬇ 내보내기</button>
    <button type="button" id="importBtn">⬆ 가져오기</button>
    <input type="file" id="importFile" accept="application/json" class="hidden">
    <span class="io-status" id="ioStatus"></span>
  </div>

  <section class="todo-card" id="todoSection">
    <div class="todo-header">
      <h2>✅ TODO</h2>
      <button id="pipBtn">📌 항상 위 고정</button>
    </div>
    <div class="todo-input-row">
      <input type="text" id="todoInput" placeholder="할 일을 입력하세요">
      <button id="todoAddBtn">추가</button>
    </div>
    <ul class="todo-list" id="todoList"></ul>
    <div class="todo-hint" id="pipHint"></div>
  </section>
  <div class="todo-placeholder hidden" id="todoPlaceholder">📌 TODO 목록이 고정 창에 표시되고 있습니다.</div>

  <section class="form-card">
    <textarea id="contentInput" placeholder="오늘 한 업무를 입력하세요..."></textarea>
    <div class="datetime-row">
      <label>시작 <input type="datetime-local" id="startInput"></label>
      <label><input type="checkbox" id="rangeToggle"> 기간으로 설정</label>
      <label id="endLabel" class="hidden">종료 <input type="datetime-local" id="endInput"></label>
    </div>
    <div class="category-row">
      <label>카테고리 <select id="categoryInput"></select></label>
      <button type="button" class="category-manage-btn" id="categoryManageBtn">카테고리 관리</button>
    </div>
    <div class="category-panel hidden" id="categoryPanel">
      <div class="category-chip-list" id="categoryChipList"></div>
      <div class="category-add-row">
        <input type="text" id="newCategoryInput" placeholder="새 카테고리 이름">
        <button type="button" id="addCategoryBtn">추가</button>
      </div>
    </div>
    <div class="actions">
      <button id="cancelEditBtn" class="hidden">취소</button>
      <button id="saveBtn">저장</button>
    </div>
  </section>

  <section class="summary-card" id="summarySection">
    <div class="summary-header">
      <h2>📅 이번 주 요약</h2>
      <span class="summary-range" id="summaryRange"></span>
    </div>
    <div id="summaryBody"></div>
  </section>

  <div class="search-row">
    <input type="text" id="searchInput" placeholder="🔍 검색어 (내용/카테고리)">
    <input type="date" id="searchDateInput">
    <button type="button" id="resetSearchBtn">초기화</button>
  </div>

  <section class="entry-list" id="entryList"></section>
</div>

<script>
(function () {
  const STORAGE_KEY = 'workLog.entries';
  const TODO_STORAGE_KEY = 'workLog.todos';
  const CATEGORY_STORAGE_KEY = 'workLog.categories';
  const DEFAULT_CATEGORIES = ['회의', '개발', '문서·보고', '고객대응', '기타'];

  const contentInput = document.getElementById('contentInput');
  const startInput = document.getElementById('startInput');
  const endInput = document.getElementById('endInput');
  const endLabel = document.getElementById('endLabel');
  const rangeToggle = document.getElementById('rangeToggle');
  const saveBtn = document.getElementById('saveBtn');
  const cancelEditBtn = document.getElementById('cancelEditBtn');
  const entryList = document.getElementById('entryList');
  const entryCount = document.getElementById('entryCount');

  const todoSection = document.getElementById('todoSection');
  const todoPlaceholder = document.getElementById('todoPlaceholder');
  const todoInput = document.getElementById('todoInput');
  const todoAddBtn = document.getElementById('todoAddBtn');
  const todoList = document.getElementById('todoList');
  const pipBtn = document.getElementById('pipBtn');
  const pipHint = document.getElementById('pipHint');

  const categoryInput = document.getElementById('categoryInput');
  const categoryManageBtn = document.getElementById('categoryManageBtn');
  const categoryPanel = document.getElementById('categoryPanel');
  const categoryChipList = document.getElementById('categoryChipList');
  const newCategoryInput = document.getElementById('newCategoryInput');
  const addCategoryBtn = document.getElementById('addCategoryBtn');
  const summaryRange = document.getElementById('summaryRange');
  const summaryBody = document.getElementById('summaryBody');

  const searchInput = document.getElementById('searchInput');
  const searchDateInput = document.getElementById('searchDateInput');
  const resetSearchBtn = document.getElementById('resetSearchBtn');

  const exportBtn = document.getElementById('exportBtn');
  const importBtn = document.getElementById('importBtn');
  const importFile = document.getElementById('importFile');
  const ioStatus = document.getElementById('ioStatus');

  let editingId = null;
  let pipWindow = null;

  function loadEntries() {
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    } catch {
      return [];
    }
  }

  function saveEntries(entries) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
  }

  function toDatetimeLocalValue(date) {
    const pad = (n) => String(n).padStart(2, '0');
    return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}T${pad(date.getHours())}:${pad(date.getMinutes())}`;
  }

  function formatKorean(isoString) {
    const d = new Date(isoString);
    const pad = (n) => String(n).padStart(2, '0');
    return `${d.getFullYear()}년 ${pad(d.getMonth() + 1)}월 ${pad(d.getDate())}일 ${pad(d.getHours())}:${pad(d.getMinutes())}`;
  }

  function formatKoreanShort(isoString) {
    const d = new Date(isoString);
    const pad = (n) => String(n).padStart(2, '0');
    return `${pad(d.getMonth() + 1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
  }

  // 네이티브 confirm()은 일부 미리보기 환경(샌드박스 iframe)에서 차단될 수 있어
  // "한 번 더 누르면 삭제" 방식의 자체 확인으로 대체.
  function bindDeleteConfirm(btn, onConfirm) {
    btn.addEventListener('click', () => {
      if (btn.dataset.confirming === '1') {
        onConfirm();
        return;
      }
      btn.dataset.confirming = '1';
      const original = btn.textContent;
      btn.textContent = '정말 삭제?';
      btn.classList.add('confirming');
      setTimeout(() => {
        btn.dataset.confirming = '0';
        btn.textContent = original;
        btn.classList.remove('confirming');
      }, 2500);
    });
  }

  // ---- 카테고리 ----

  function loadCategories() {
    try {
      const stored = JSON.parse(localStorage.getItem(CATEGORY_STORAGE_KEY));
      if (Array.isArray(stored)) return stored;
    } catch {}
    saveCategories(DEFAULT_CATEGORIES);
    return [...DEFAULT_CATEGORIES];
  }

  function saveCategories(categories) {
    localStorage.setItem(CATEGORY_STORAGE_KEY, JSON.stringify(categories));
  }

  function renderCategorySelect(selectedValue) {
    const categories = loadCategories();
    const current = selectedValue !== undefined ? selectedValue : categoryInput.value;
    categoryInput.innerHTML = '';
    const noneOpt = document.createElement('option');
    noneOpt.value = '';
    noneOpt.textContent = '미분류';
    categoryInput.appendChild(noneOpt);
    categories.forEach((c) => {
      const opt = document.createElement('option');
      opt.value = c;
      opt.textContent = c;
      categoryInput.appendChild(opt);
    });
    categoryInput.value = categories.includes(current) ? current : '';
  }

  function renderCategoryChips() {
    const categories = loadCategories();
    categoryChipList.innerHTML = '';
    if (!categories.length) {
      const empty = document.createElement('span');
      empty.className = 'summary-empty';
      empty.style.padding = '0';
      empty.textContent = '등록된 카테고리가 없습니다.';
      categoryChipList.appendChild(empty);
      return;
    }
    categories.forEach((c) => {
      const chip = document.createElement('span');
      chip.className = 'category-chip';
      const label = document.createElement('span');
      label.textContent = c;
      const removeBtn = document.createElement('button');
      removeBtn.type = 'button';
      removeBtn.textContent = '×';
      removeBtn.addEventListener('click', () => removeCategory(c));
      chip.appendChild(label);
      chip.appendChild(removeBtn);
      categoryChipList.appendChild(chip);
    });
  }

  function addCategory() {
    const name = newCategoryInput.value.trim();
    if (!name) {
      newCategoryInput.focus();
      return;
    }
    const categories = loadCategories();
    if (!categories.includes(name)) {
      categories.push(name);
      saveCategories(categories);
    }
    newCategoryInput.value = '';
    renderCategoryChips();
    renderCategorySelect();
    newCategoryInput.focus();
  }

  function removeCategory(name) {
    saveCategories(loadCategories().filter((c) => c !== name));
    renderCategoryChips();
    renderCategorySelect();
  }

  categoryManageBtn.addEventListener('click', () => {
    categoryPanel.classList.toggle('hidden');
    if (!categoryPanel.classList.contains('hidden')) renderCategoryChips();
  });
  addCategoryBtn.addEventListener('click', addCategory);
  newCategoryInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') addCategory();
  });

  // ---- 주간 요약 ----

  function getWeekRange(date) {
    const d = new Date(date);
    d.setHours(0, 0, 0, 0);
    const day = d.getDay();
    const diffToMonday = day === 0 ? -6 : 1 - day;
    const start = new Date(d);
    start.setDate(d.getDate() + diffToMonday);
    const end = new Date(start);
    end.setDate(start.getDate() + 6);
    end.setHours(23, 59, 59, 999);
    return { start, end };
  }

  function formatDateShort(d) {
    const pad = (n) => String(n).padStart(2, '0');
    return `${d.getFullYear()}년 ${pad(d.getMonth() + 1)}월 ${pad(d.getDate())}일`;
  }

  function renderSummary() {
    const { start, end } = getWeekRange(new Date());
    summaryRange.textContent = `${formatDateShort(start)} ~ ${formatDateShort(end)}`;

    const entries = loadEntries().filter((e) => {
      const t = new Date(e.start).getTime();
      return t >= start.getTime() && t <= end.getTime();
    });

    summaryBody.innerHTML = '';

    if (!entries.length) {
      const empty = document.createElement('div');
      empty.className = 'summary-empty';
      empty.textContent = '이번 주에 작성된 업무일지가 없습니다.';
      summaryBody.appendChild(empty);
      return;
    }

    const groups = {};
    entries.forEach((e) => {
      const key = e.category || '미분류';
      (groups[key] = groups[key] || []).push(e);
    });

    Object.keys(groups)
      .sort((a, b) => groups[b].length - groups[a].length)
      .forEach((key) => {
        const items = groups[key].sort((a, b) => new Date(a.start) - new Date(b.start));

        const groupEl = document.createElement('div');
        groupEl.className = 'summary-group';

        const titleEl = document.createElement('div');
        titleEl.className = 'summary-group-title';
        titleEl.textContent = key + ' ';
        const countEl = document.createElement('span');
        countEl.className = 'count';
        countEl.textContent = `${items.length}건`;
        titleEl.appendChild(countEl);
        groupEl.appendChild(titleEl);

        items.forEach((e) => {
          const itemEl = document.createElement('div');
          itemEl.className = 'summary-item';
          const timeEl = document.createElement('span');
          timeEl.className = 'summary-time';
          timeEl.textContent = formatKoreanShort(e.start);
          const textEl = document.createElement('span');
          textEl.className = 'summary-text';
          textEl.textContent = e.content;
          itemEl.appendChild(timeEl);
          itemEl.appendChild(textEl);
          groupEl.appendChild(itemEl);
        });

        summaryBody.appendChild(groupEl);
      });
  }

  // ---- TODO ----

  function loadTodos() {
    try {
      return JSON.parse(localStorage.getItem(TODO_STORAGE_KEY)) || [];
    } catch {
      return [];
    }
  }

  // 이전 버전(체크 시 목록에 남아있던 방식)에서 완료 표시된 TODO가 있다면
  // 업무일지 항목으로 옮기고 TODO 목록에서 제거한다. 1회성 이관.
  function migrateCompletedTodos() {
    const todos = loadTodos();
    const completed = todos.filter((t) => t.done);
    if (!completed.length) return;

    const entries = loadEntries();
    completed.forEach((t) => {
      const stamp = t.completedAt || t.createdAt || new Date().toISOString();
      entries.push({
        id: crypto.randomUUID(),
        content: t.memo ? `${t.text}\n\n${t.memo}` : t.text,
        start: stamp,
        end: null,
        category: null,
        createdAt: stamp,
        updatedAt: stamp,
      });
    });
    saveEntries(entries);
    saveTodos(todos.filter((t) => !t.done));
  }

  function saveTodos(todos) {
    localStorage.setItem(TODO_STORAGE_KEY, JSON.stringify(todos));
  }

  function addTodo() {
    const text = todoInput.value.trim();
    if (!text) {
      todoInput.focus();
      return;
    }
    const todos = loadTodos();
    todos.push({
      id: crypto.randomUUID(),
      text,
      memo: '',
      createdAt: new Date().toISOString(),
    });
    saveTodos(todos);
    todoInput.value = '';
    todoInput.focus();
    renderTodos();
  }

  // 체크 완료 시 TODO 목록에서 사라지고, 수기 작성과 동일한 업무일지 항목으로 전환된다.
  function completeTodo(id) {
    const todos = loadTodos();
    const todo = todos.find((t) => t.id === id);
    if (!todo) return;

    const nowIso = new Date().toISOString();
    const entries = loadEntries();
    entries.push({
      id: crypto.randomUUID(),
      content: todo.memo ? `${todo.text}\n\n${todo.memo}` : todo.text,
      start: nowIso,
      end: null,
      category: null,
      createdAt: nowIso,
      updatedAt: nowIso,
    });
    saveEntries(entries);
    saveTodos(todos.filter((t) => t.id !== id));

    renderTodos();
    render();
  }

  function saveTodoMemo(id, memo) {
    const todos = loadTodos().map((t) => (t.id === id ? { ...t, memo } : t));
    saveTodos(todos);
    renderTodos();
  }

  function deleteTodo(id) {
    saveTodos(loadTodos().filter((t) => t.id !== id));
    renderTodos();
  }

  function renderTodos() {
    const todos = loadTodos().sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));

    if (!todos.length) {
      todoList.innerHTML = '<li class="todo-empty">할 일이 없습니다.</li>';
      return;
    }

    todoList.innerHTML = todos.map((t) => `
      <li class="todo-item" data-id="${t.id}">
        <input type="checkbox" class="todo-check">
        <div class="todo-body">
          <div class="todo-text-row">
            <span class="todo-text"></span>
            <span class="memo-trigger">
              <span class="memo-trigger-label"></span>
              <span class="memo-popup"></span>
            </span>
          </div>
          <div class="todo-meta">생성 ${formatKoreanShort(t.createdAt)}</div>
          <div class="memo-edit hidden">
            <textarea class="memo-textarea" placeholder="상세 메모를 입력하세요"></textarea>
            <div class="memo-edit-actions">
              <button type="button" class="memo-cancel-btn">취소</button>
              <button type="button" class="memo-save-btn">저장</button>
            </div>
          </div>
        </div>
        <button class="icon-btn danger delete-btn">삭제</button>
      </li>
    `).join('');

    todoList.querySelectorAll('.todo-item').forEach((li) => {
      const id = li.getAttribute('data-id');
      const todo = todos.find((t) => t.id === id);
      li.querySelector('.todo-text').textContent = todo.text;
      li.querySelector('.todo-check').addEventListener('change', (e) => {
        if (e.target.checked) completeTodo(id);
      });
      bindDeleteConfirm(li.querySelector('.delete-btn'), () => deleteTodo(id));

      const memoTrigger = li.querySelector('.memo-trigger');
      const memoLabel = li.querySelector('.memo-trigger-label');
      const memoPopup = li.querySelector('.memo-popup');
      const memoEdit = li.querySelector('.memo-edit');
      const memoTextarea = li.querySelector('.memo-textarea');

      memoLabel.textContent = todo.memo ? '📝 메모' : '+ 메모';
      memoPopup.textContent = todo.memo || '';

      memoTrigger.addEventListener('click', () => {
        memoTextarea.value = todo.memo || '';
        memoEdit.classList.toggle('hidden');
        if (!memoEdit.classList.contains('hidden')) memoTextarea.focus();
      });
      li.querySelector('.memo-cancel-btn').addEventListener('click', () => {
        memoEdit.classList.add('hidden');
      });
      li.querySelector('.memo-save-btn').addEventListener('click', () => {
        saveTodoMemo(id, memoTextarea.value.trim());
      });
    });
  }

  todoAddBtn.addEventListener('click', addTodo);
  todoInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') addTodo();
  });

  // ---- 항상 위 고정 (Document Picture-in-Picture) ----

  if (!('documentPictureInPicture' in window)) {
    pipHint.textContent = '※ 항상 위 고정은 Chrome/Edge 최신 버전에서만 지원됩니다.';
  }

  async function openPip() {
    if (!('documentPictureInPicture' in window)) {
      alert('이 브라우저는 항상 위 고정 기능을 지원하지 않습니다. Chrome 또는 Edge 최신 버전에서 사용해 주세요.');
      return;
    }
    pipWindow = await documentPictureInPicture.requestWindow({ width: 320, height: 420 });

    [...document.styleSheets].forEach((styleSheet) => {
      try {
        const css = [...styleSheet.cssRules].map((r) => r.cssText).join('');
        const style = document.createElement('style');
        style.textContent = css;
        pipWindow.document.head.appendChild(style);
      } catch {
        const link = document.createElement('link');
        link.rel = 'stylesheet';
        link.type = styleSheet.type;
        link.media = styleSheet.media;
        link.href = styleSheet.href;
        pipWindow.document.head.appendChild(link);
      }
    });
    pipWindow.document.body.style.margin = '12px';
    pipWindow.document.body.appendChild(todoSection);
    todoPlaceholder.classList.remove('hidden');

    pipBtn.textContent = '✕ 고정 해제';
    pipBtn.onclick = () => pipWindow.close();

    pipWindow.addEventListener('pagehide', () => {
      todoPlaceholder.classList.add('hidden');
      todoPlaceholder.insertAdjacentElement('beforebegin', todoSection);
      pipBtn.textContent = '📌 항상 위 고정';
      pipBtn.onclick = openPip;
      pipWindow = null;
      renderTodos();
    }, { once: true });
  }

  pipBtn.addEventListener('click', openPip);

  function resetForm() {
    contentInput.value = '';
    startInput.value = toDatetimeLocalValue(new Date());
    rangeToggle.checked = false;
    endLabel.classList.add('hidden');
    endInput.value = '';
    renderCategorySelect('');
    editingId = null;
    saveBtn.textContent = '저장';
    cancelEditBtn.classList.add('hidden');
  }

  rangeToggle.addEventListener('change', () => {
    endLabel.classList.toggle('hidden', !rangeToggle.checked);
    if (rangeToggle.checked && !endInput.value) {
      endInput.value = startInput.value;
    }
  });

  saveBtn.addEventListener('click', () => {
    const content = contentInput.value.trim();
    if (!content) {
      contentInput.focus();
      return;
    }
    if (!startInput.value) {
      startInput.value = toDatetimeLocalValue(new Date());
    }

    const start = new Date(startInput.value).toISOString();
    const end = rangeToggle.checked && endInput.value ? new Date(endInput.value).toISOString() : null;
    const category = categoryInput.value || null;
    const nowIso = new Date().toISOString();

    let entries = loadEntries();

    if (editingId) {
      entries = entries.map((e) =>
        e.id === editingId ? { ...e, content, start, end, category, updatedAt: nowIso } : e
      );
    } else {
      entries.push({
        id: crypto.randomUUID(),
        content,
        start,
        end,
        category,
        createdAt: nowIso,
        updatedAt: nowIso,
      });
    }

    saveEntries(entries);
    resetForm();
    render();
  });

  cancelEditBtn.addEventListener('click', resetForm);

  searchInput.addEventListener('input', render);
  searchDateInput.addEventListener('change', render);
  resetSearchBtn.addEventListener('click', () => {
    searchInput.value = '';
    searchDateInput.value = '';
    render();
  });

  function startEdit(entry) {
    editingId = entry.id;
    contentInput.value = entry.content;
    startInput.value = toDatetimeLocalValue(new Date(entry.start));
    if (entry.end) {
      rangeToggle.checked = true;
      endLabel.classList.remove('hidden');
      endInput.value = toDatetimeLocalValue(new Date(entry.end));
    } else {
      rangeToggle.checked = false;
      endLabel.classList.add('hidden');
      endInput.value = '';
    }
    renderCategorySelect(entry.category || '');
    saveBtn.textContent = '수정 완료';
    cancelEditBtn.classList.remove('hidden');
    contentInput.focus();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function deleteEntry(id) {
    const entries = loadEntries().filter((e) => e.id !== id);
    saveEntries(entries);
    if (editingId === id) resetForm();
    render();
  }

  function matchesSearch(entry, keyword, dateFilter) {
    if (keyword) {
      const haystack = `${entry.content} ${entry.category || ''}`.toLowerCase();
      if (!haystack.includes(keyword)) return false;
    }
    if (dateFilter) {
      const startDate = entry.start.slice(0, 10);
      const endDate = entry.end ? entry.end.slice(0, 10) : startDate;
      if (dateFilter < startDate || dateFilter > endDate) return false;
    }
    return true;
  }

  function render() {
    const keyword = searchInput.value.trim().toLowerCase();
    const dateFilter = searchDateInput.value;
    const isFiltering = !!keyword || !!dateFilter;

    const allEntries = loadEntries();
    const entries = allEntries
      .filter((e) => matchesSearch(e, keyword, dateFilter))
      .sort((a, b) => new Date(b.start) - new Date(a.start));

    entryCount.textContent = isFiltering
      ? (entries.length ? `검색결과 ${entries.length}건` : '검색결과 없음')
      : (allEntries.length ? `총 ${allEntries.length}건` : '');
    renderSummary();

    if (!entries.length) {
      entryList.innerHTML = `<div class="empty-state">${isFiltering ? '검색 결과가 없습니다.' : '아직 작성된 업무일지가 없습니다.'}</div>`;
      return;
    }

    entryList.innerHTML = entries.map((e) => {
      const stamp = e.end
        ? `${formatKorean(e.start)} ~ ${formatKorean(e.end)}`
        : formatKorean(e.start);
      return `
        <div class="entry-card" data-id="${e.id}">
          <div class="entry-meta">
            <span class="meta-left">
              <span class="stamp">${stamp}</span>
              <span class="category-tag"></span>
            </span>
            <span class="entry-actions">
              <button class="icon-btn edit-btn">수정</button>
              <button class="icon-btn danger delete-btn">삭제</button>
            </span>
          </div>
          <div class="entry-content"></div>
        </div>
      `;
    }).join('');

    entryList.querySelectorAll('.entry-card').forEach((card) => {
      const id = card.getAttribute('data-id');
      const entry = entries.find((e) => e.id === id);
      card.querySelector('.entry-content').textContent = entry.content;
      card.querySelector('.category-tag').textContent = entry.category || '미분류';
      card.querySelector('.edit-btn').addEventListener('click', () => startEdit(entry));
      bindDeleteConfirm(card.querySelector('.delete-btn'), () => deleteEntry(id));
    });
  }

  // ---- 가져오기/내보내기 ----

  function showIoStatus(msg) {
    ioStatus.textContent = msg;
    clearTimeout(showIoStatus._timer);
    showIoStatus._timer = setTimeout(() => { ioStatus.textContent = ''; }, 4000);
  }

  exportBtn.addEventListener('click', () => {
    const data = {
      entries: loadEntries(),
      todos: loadTodos(),
      categories: loadCategories(),
      exportedAt: new Date().toISOString(),
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `업무일지_백업_${new Date().toISOString().slice(0, 10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showIoStatus('내보내기 완료');
  });

  importBtn.addEventListener('click', () => importFile.click());

  importFile.addEventListener('change', () => {
    const file = importFile.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        let addedEntries = 0;
        let addedTodos = 0;

        if (Array.isArray(data.entries)) {
          const existing = loadEntries();
          const existingIds = new Set(existing.map((e) => e.id));
          const incoming = data.entries.filter((e) => !existingIds.has(e.id));
          saveEntries([...existing, ...incoming]);
          addedEntries = incoming.length;
        }
        if (Array.isArray(data.todos)) {
          const existing = loadTodos();
          const existingIds = new Set(existing.map((t) => t.id));
          const incoming = data.todos.filter((t) => !existingIds.has(t.id));
          saveTodos([...existing, ...incoming]);
          addedTodos = incoming.length;
        }
        if (Array.isArray(data.categories) && data.categories.length) {
          saveCategories(Array.from(new Set([...loadCategories(), ...data.categories])));
        }

        renderCategorySelect();
        render();
        renderTodos();
        showIoStatus(`가져오기 완료 (업무일지 ${addedEntries}건, TODO ${addedTodos}건 추가)`);
      } catch {
        showIoStatus('가져오기 실패: JSON 파일 형식을 확인해주세요.');
      }
      importFile.value = '';
    };
    reader.readAsText(file);
  });

  migrateCompletedTodos();
  resetForm();
  render();
  renderTodos();
})();
</script>
</body>
</html>
